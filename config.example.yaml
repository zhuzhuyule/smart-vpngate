# Smart VPNGate configuration (V2)
# Everything is YAML. Copy to config.yaml and edit. All sections are optional;
# omitted keys fall back to the defaults shown here.

discovery:
  # Country allowlist (ISO-3166 alpha-2). Empty = all countries allowed.
  countries:
    - JP
    - KR
    - US
  # Countries to always exclude, even if allowlisted.
  blacklist:
    - CN
    - RU
  # Accepted OpenVPN transport protocols.
  protocols:
    - tcp
    - udp
  # How many nodes to keep per country (requirement 1: you define the count).
  max_nodes_per_country: 100
  # Optional per-country overrides (requirement 2: different count per country).
  # Countries not listed use max_nodes_per_country.
  per_country_limits:
    JP: 50
    KR: 30
  min_score: 0        # minimum VPNGate score
  min_speed: 0        # minimum measured speed (enforced by Node Pool)
  max_ping: 9999      # maximum ping in ms
  refresh_interval: 1800   # seconds between discovery refreshes (30 min)

policy:
  # locked-country | priority | auto
  mode: locked-country
  # Used when mode == locked-country.
  country: JP
  # Fallback order when mode == priority.
  priority:
    - JP
    - KR
    - SG
    - US
  # Stay on the current node unless it fails (avoid churn).
  stickiness: true
  # Requirement 3: on failover, prefer a node in the same/preferred country;
  # if none is viable there, fall back to the fastest healthy node anywhere.
  fallback_fastest: true

health:
  interval: 300   # seconds between health checks (5 min)

dashboard:
  auto_refresh: true
