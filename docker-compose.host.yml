# Host 网络模式：不做端口映射，容器直接用宿主机网络。
#
# 用法：
#   docker compose -f docker-compose.host.yml up -d --build
#
# 说明：
#   - 出口数量在网页里任意 1~10 调整、即时生效，无需改端口映射（这是 host 模式最省心的地方）。
#   - 代理默认绑 127.0.0.1（本机始终可用）；要对外提供代理，把 LOCAL_PROXY_HOST 改成 ::
#     并在防火墙/安全组放行对应端口段，同时建议给代理设置密码鉴权。
#   - host 模式下 rp_filter 由程序自身 `sysctl -w`（配合 NET_ADMIN）设置，故此处不再声明 sysctls。
services:
  smart-vpngate:
    build: .
    image: smart-vpngate:latest
    container_name: smart-vpngate
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      - EXIT_COUNT=5
      - LOCAL_PROXY_HOST=127.0.0.1   # 本机可用；对外提供改为 ::
      - UI_HOST=::
    volumes:
      - ./data:/app/vpngate_data
